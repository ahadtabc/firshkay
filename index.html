<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Firskay</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet">
    <script src="script.js" defer></script>
</head>

<body>

    <div class="wrap">
        <header>
            <div class="header-left">
                <a href="index.html"><img src="assets/images/logo.svg" alt="friskay_logo"></a>
                <div class="divider hide-mobile"></div>
                <a class="home hide-mobile" href="#">Home</a>
            </div>

            <nav>
                <a class="menu-open hide-desktop" href="#"><img src="assets/images/hamburger.svg" alt="menu_icon"></a>
                <ul>
                    <li class="hide-desktop">
                        <a class="menu-close" href="#"><img src="assets/images/close.svg" alt="close_button"></a>
                    </li>
                    <li><a href="#">Our Food</a></li>
                    <li><a href="#">Ingredients</a></li>
                    <li><a href="#">Studies</a></li>
                    <li><a href="#">FAQ</a></li>
                </ul>
            </nav>
        </header>

        <main>
            <h1>Your cat will go <img src="assets/images/bonkers.svg" alt="text_bonkers"></h1>
            <p class="subhead">
                ..for the world’s best testing cat food, sourced with
                only the finest ingredients. Made with love from the
                heart of Mississippi.
            </p>
            <a class="bonker-button" href="#">Get Bonkers</a>
        </main>

        <div class="cat-container">
            <div class="cat">
                <img src="assets/images/cat.png" alt="cute cat">
                <div class="inner-circle"></div>
                <div class="outter-circle"></div>
            </div>
        </div>

    </div>
</body>

</html>
